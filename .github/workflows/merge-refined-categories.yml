name: Merge Refined Category Shards

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Workflow run id that produced refined-shard-* artifacts"
        required: true
      output_name:
        description: "Final merged JSON filename"
        required: true
        default: "ACL2026_refined_categories_full.json"
      limit_papers:
        description: "Limit papers for smoke-test artifacts; 0 means full run"
        required: true
        default: "0"

permissions:
  actions: read
  contents: read

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Download shard artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ inputs.source_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pattern: refined-shard-*
          merge-multiple: true

      - name: Merge shards
        env:
          INPUT_JSON: ACL2026_all_papers.json
          SHARD_GLOB: ACL2026_refined_categories_shard_*.json
          OUTPUT_JSON: ${{ inputs.output_name }}
          REPORT_MD: ACL2026_refined_categories_full_report.md
          LIMIT_PAPERS: ${{ inputs.limit_papers }}
          STRATIFIED_SAMPLE: "0"
        run: python -u merge_refined_category_shards.py

      - name: Upload merged result
        uses: actions/upload-artifact@v4
        with:
          name: refined-categories-merged
          path: |
            ${{ inputs.output_name }}
            ACL2026_refined_categories_full_report.md
          if-no-files-found: error
